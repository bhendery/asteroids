<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroid Shooter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>ASTEROID SHOOTER</h1>
  <div class="ui">
    <span class="score">SCORE: <span id="score">0</span></span>
    <span class="lives">LIVES: <span id="lives">3</span></span>
  </div>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <p class="instructions">ARROWS / WASD — MOVE &nbsp;|&nbsp; SPACE — FIRE &nbsp;|&nbsp; Dodge & blast everything coming at you!</p>

  <div id="startScreen" class="start-screen">
    <h2>READY TO LAUNCH</h2>
    <p>Side-scrolling preview build.</p>
    <p>Asteroids and saucers fly in from the right.</p>
    <p>Difficulty increases over time. Good luck!</p>
    <button id="startBtn">START GAME</button>
  </div>

  <div id="gameOverScreen" class="game-over hidden">
    <h2>GAME OVER</h2>
    <p>Final Score: <span id="finalScore">0</span></p>
    <button id="restartBtn">PLAY AGAIN</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
