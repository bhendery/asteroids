<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroid Shooter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>ASTEROID SHOOTER</h1>
  <div class="ui">
    <span class="score">SCORE: <span id="score">0</span></span>
  </div>
  <div class="canvas-wrap">
    <div id="lives" class="lives-hud" aria-label="Lives remaining"></div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
  </div>
  <p class="instructions">ARROWS / WASD — MOVE &nbsp;|&nbsp; SPACE — FIRE &nbsp;|&nbsp; Don't let asteroids hit you!</p>

  <div id="startScreen" class="start-screen">
    <h2>READY TO LAUNCH</h2>
    <p>Destroy asteroids before they hit you.</p>
    <p>Large asteroids split into smaller ones.</p>
    <p>Difficulty increases over time. Good luck!</p>
    <button id="startBtn">START GAME</button>
  </div>

  <div id="gameOverScreen" class="game-over hidden">
    <h2>GAME OVER</h2>
    <p>Final Score: <span id="finalScore">0</span></p>
    <button id="restartBtn">PLAY AGAIN</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
